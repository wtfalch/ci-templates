name: Check & Test

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        required: false
        default: '22'
      run-e2e:
        type: boolean
        required: false
        default: true

# Cancel in-flight CI for a branch when a newer commit lands; we don't need
# stale runs blocking the queue. Deploys are gated separately.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  e2e:
    name: Build & Playwright e2e
    if: ${{ inputs.run-e2e }}
    runs-on: ubuntu-latest
    env:
      # Stub envs so `next build` and `next start` succeed without real Supabase.
      # The home + login Playwright smoke tests don't make authenticated requests.
      # Apps that add e2e tests hitting Supabase must layer real envs in the caller.
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key-for-build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      # Warm Next's incremental build cache between runs. Keyed on the lockfile
      # plus source so unrelated commits restore from the most recent neighbour.
      - name: Cache Next build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextcache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('app/**', 'src/**', 'pages/**', '*.config.*', 'tsconfig.json') }}
          restore-keys: |
            nextcache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextcache-${{ runner.os }}-
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build
      - run: pnpm test:e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

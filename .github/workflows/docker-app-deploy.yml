name: Static site build & deploy

on:
  workflow_call:
    inputs:
      image-name:
        description: GHCR image name (without registry/owner). Defaults to caller repo name.
        type: string
        required: false
        default: ${{ github.event.repository.name }}
      service-name:
        description: Compose service to pull/restart on the host.
        type: string
        required: false
        default: web
      cloudflare-zone-id:
        description: |
          If set, purge Cloudflare cache for this zone after a successful deploy.
          Requires the CLOUDFLARE_API_TOKEN secret. Apps that don't opt into edge HTML
          caching can leave this unset and the purge step is skipped entirely.
        type: string
        required: false
        default: ''
      build-args:
        description: |
          Multi-line list of `KEY=VALUE` pairs forwarded as `--build-arg` to
          `docker/build-push-action`. Use for vars that must be present at
          `next build` time (e.g. NEXT_PUBLIC_*, which Next bakes into the
          client bundle). Caller resolves values from secrets:
            build-args: |
              NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
              NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        type: string
        required: false
        default: ''
    secrets:
      DEPLOY_SSH_KEY:
        required: true
      CF_ACCESS_CLIENT_ID:
        required: true
      CF_ACCESS_CLIENT_SECRET:
        required: true
      DEPLOY_HOST:
        required: true
      DEPLOY_USER:
        required: true
      DEPLOY_PATH:
        required: true
      CLOUDFLARE_API_TOKEN:
        description: API token with Zone Cache Purge scope. Required only if cloudflare-zone-id is set.
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ github.sha }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy
        env:
          CF_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          PATH_ON_HOST: ${{ secrets.DEPLOY_PATH }}
          SERVICE: ${{ inputs.service-name }}
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            -o ProxyCommand="cloudflared access ssh --hostname %h --id $CF_ID --secret $CF_SECRET" \
            "${USER}@${HOST}" \
            "cd ${PATH_ON_HOST} && docker compose pull ${SERVICE} && docker compose up -d --no-deps ${SERVICE} && docker image prune -f"

      - name: Purge Cloudflare cache
        if: ${{ inputs.cloudflare-zone-id != '' }}
        env:
          ZONE_ID: ${{ inputs.cloudflare-zone-id }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "${CF_API_TOKEN:-}" ]; then
            echo "::error::cloudflare-zone-id is set but CLOUDFLARE_API_TOKEN secret is missing"
            exit 1
          fi
          response=$(curl -fsSL -X POST \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          if echo "$response" | grep -q '"success":true'; then
            echo "::notice::CF cache purged for zone ${ZONE_ID}"
          else
            echo "::error::CF purge failed"
            echo "$response"
            exit 1
          fi
